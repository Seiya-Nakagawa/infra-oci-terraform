---
- name: Set timezone to Asia/Tokyo
  timezone:
    name: Asia/Tokyo

- name: Install basic packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - iptables-persistent
    state: present
    update_cache: yes

- name: Allow HTTP (80) via iptables
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    action: insert
    rule_num: "5"

- name: Allow HTTPS (443) via iptables
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    action: insert
    rule_num: "5"

- name: Save iptables rules
  shell: netfilter-persistent save
  changed_when: true
